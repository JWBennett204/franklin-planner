<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franklin Planner</title>

    <link rel="stylesheet" href="css/planner.css">
</head>
<body>

<div id="plannerRow">

    <div id="leftColumn">
        <div id="dateCluster"></div>
        <div id="taskList"></div>
    </div>

    <div id="schedule"></div>

    <div id="notes">
        <div id="notesHeader"></div>

        <!-- NO INLINE STYLES -->
        <div id="notesArea"></div>
    </div>

</div>

<script src="js/tasks.js"></script>
<script src="js/calendar.js"></script>
<script src="js/notes.js"></script>

<script type="module">
    import { renderScheduleGrid } from "./js/fp-schedule.js";
    import { initScheduleBehavior } from "./js/schedule-behavior.js";

    window.addEventListener("load", () => {

        if (typeof currentDate === "undefined") {
            window.currentDate = new Date();
        }

        renderScheduleGrid();

        if (typeof renderDateCluster === "function") {
            renderDateCluster();
        }

        initScheduleBehavior(() => window.currentPlannerDateKey);

        if (typeof initNotes === "function") {
            initNotes();
        }

        setTimeout(() => {
            if (typeof window.loadTasksFor === "function") {
                window.loadTasksFor(new Date());
            }
        }, 100);

    });
</script>

<!-- Single Visual Forward Modal -->
<div id="forwardModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:8px; width:460px; max-height:85vh; overflow:auto; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
        <h3 style="margin:0 0 16px 0;">Forward Note to Task</h3>
        
        <label><strong>Task Name:</strong></label><br>
        <input id="modalTaskName" type="text" style="width:100%; padding:10px; margin:8px 0 16px 0; border:1px solid #b8c3c0; border-radius:4px; font-size:15px;">
        
        <label><strong>Select Forward Date:</strong></label><br>
        <div id="modalCalendarContainer" style="margin:12px 0; border:1px solid #b8c3c0; padding:10px; border-radius:6px; background:#f8f9f8;"></div>
        
        <div style="text-align:right; margin-top:16px;">
            <button onclick="confirmForwardModal()" style="background:#244e52; color:white; padding:10px 20px; border:none; border-radius:4px; margin-right:8px; cursor:pointer;">Forward</button>
            <button onclick="closeForwardModal()" style="padding:10px 20px; border:1px solid #b8c3c0; background:white; border-radius:4px; cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>

</body>
</html>
